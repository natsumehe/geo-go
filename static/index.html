<!DOCTYPE html>
<html>
<head>
    <title>Geo-Go 实时中心</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* 顶部导航控制栏 */
        #top-bar {
            position: absolute; top: 20px; right: 20px; 
            z-index: 2000; display: flex; gap: 10px;
        }
        .nav-btn {
            background: rgba(0, 0, 0, 0.8); color: #00f2ff;
            border: 1px solid #00f2ff; padding: 10px 18px;
            border-radius: 4px; cursor: pointer; font-weight: bold;
            font-size: 14px; transition: 0.3s;
        }
        .nav-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 10px #00f2ff; }

        /* 左侧动态设备列表 */
        #sidebar {
            position: absolute; top: 20px; left: 20px; width: 220px;
            background: rgba(10, 10, 10, 0.85); color: #00f2ff;
            padding: 15px; border-radius: 8px; z-index: 2000;
            border: 1px solid #333; backdrop-filter: blur(5px);
            max-height: 80vh; overflow-y: auto;
        }
        #sidebar h3 { margin: 0 0 15px 0; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #device-list { list-style: none; padding: 0; margin: 0; }
        #device-list li { 
            padding: 12px; border-radius: 4px; margin-bottom: 5px;
            cursor: pointer; transition: 0.2s; font-size: 13px;
            background: rgba(255,255,255,0.05); border: 1px solid transparent;
        }
        #device-list li:hover { border-color: #00f2ff; background: rgba(0, 242, 255, 0.1); }
        #device-list li.active { background: #00f2ff; color: #000; font-weight: bold; }

        /* 滚动条样式 */
        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <button class="nav-btn" onclick="location.href='mobile.html'">📱 进入采集端</button>
        <button id="fs-btn" class="nav-btn" onclick="toggleFullScreen()">🖥️ 开启全屏</button>
    </div>

    <div id="sidebar">
        <h3>🛰️ 在线设备 (24h)</h3>
        <ul id="device-list">
            <li>正在搜索信号...</li>
        </ul>
    </div>

    <div id="map"></div>

    <script src="js/app.js">
        
    </script>
</body>
</html>
