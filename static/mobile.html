<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>Geo-Go 采集终端</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --neon-blue: #00f2ff; --bg-dark: #0a0a0a; --danger: #ff0050; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-dark); color: white; margin: 0; 
            font-family: -apple-system, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        /* 顶部栏 */
        .header { padding: 40px 20px 20px; position: relative; }
        .header h1 { font-size: 24px; margin: 0; color: var(--neon-blue); }
        .header p { color: #666; font-size: 12px; margin: 5px 0; font-family: monospace; }
        .back-link { 
            display: inline-block; margin-top: 10px; color: #444; 
            text-decoration: none; font-size: 12px; border: 1px solid #222;
            padding: 4px 12px; border-radius: 12px;
        }

        /* 数据展示区 */
        .main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #coords { font-size: 16px; font-family: monospace; text-align: center; line-height: 2; color: #fff; }
        
        /* 控制区 */
        .controls { padding-bottom: 60px; display: flex; flex-direction: column; align-items: center; }
        .status-tag { font-size: 11px; color: #444; letter-spacing: 2px; margin-bottom: 20px; }
        
        /* 录制按钮 */
        .record-trigger {
            width: 76px; height: 76px; border-radius: 50%; border: 4px solid white;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.3s;
        }
        .record-circle { width: 56px; height: 56px; background: var(--danger); border-radius: 50%; transition: 0.4s; }
        
        /* 激活状态样式 */
        body.is-tracking .record-circle { border-radius: 8px; transform: scale(0.5); }
        body.is-tracking .record-trigger { border-color: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); }
        body.is-tracking .status-tag { color: var(--neon-blue); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Geo-Go <span style="color:white">Collector</span></h1>
        <p id="device-info">DETECTING DEVICE...</p>
        <button class="nav-btn" onclick="location.href='index.html'">🏠 返回实时中心</button>
    </div>

    <div class="main-display">
        <div id="coords">READY TO SCAN</div>
    </div>

    <div class="controls">
        <div id="status-tag" class="status-tag">TAP TO START LIVE TRACKING</div>
        <div class="record-trigger" id="mainBtn">
            <div class="record-circle"></div>
        </div>
    </div>

    <script src="js/mobile.js"></script>
</body>
</html>
